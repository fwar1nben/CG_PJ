    <g id="metric-1">
      <path fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" d="M786,264 H956 A10,10 0 0 1 966,274 V370 A10,10 0 0 1 956,380 H786 A10,10 0 0 1 776,370 V274 A10,10 0 0 1 786,264 Z" />
