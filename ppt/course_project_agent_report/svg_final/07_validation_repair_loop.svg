  <rect x="0" y="0" width="1280" height="720" fill="#F8FAFC" />
  <text x="56" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="800" fill="#111827">修复闭环：先诊断，再选择修复路线</text>
  <path fill="#FEE2E2" d="M64,96 H1216 A8,8 0 0 1 1224,104 V140 A8,8 0 0 1 1216,148 H64 A8,8 0 0 1 56,140 V104 A8,8 0 0 1 64,96 Z" />
  <text x="78" y="129" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#111827">Validator 发现问题后，系统不直接重试；Failure Taxonomy 先归因，Repair Router 再把问题翻译成 Refiner 的具体任务。</text>

