  <g id="evidence">
    <path fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2" d="M756,182 H1192 A12,12 0 0 1 1204,194 V600 A12,12 0 0 1 1192,612 H756 A12,12 0 0 1 744,600 V194 A12,12 0 0 1 756,182 Z" />
