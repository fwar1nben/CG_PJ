      <text x="802" y="366" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#64748B">1 轮修复后通过</text>
    </g>
    <g id="metric-2">
      <path fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" d="M996,264 H1166 A10,10 0 0 1 1176,274 V370 A10,10 0 0 1 1166,380 H996 A10,10 0 0 1 986,370 V274 A10,10 0 0 1 996,264 Z" />
      <text x="1012" y="296" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#64748B">dog run</text>
      <text x="1012" y="342" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="44" font-weight="800" fill="#16A34A">65→100</text>
      <text x="1012" y="366" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#64748B">1 轮修复后满分</text>
    </g>
    <path fill="#FEE2E2" stroke="#DC2626" stroke-width="1" d="M786,416 H1166 A10,10 0 0 1 1176,426 V538 A10,10 0 0 1 1166,548 H786 A10,10 0 0 1 776,538 V426 A10,10 0 0 1 786,416 Z" />
    <text x="804" y="452" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="800" fill="#111827">为什么不是普通 retry</text>
    <text fill="#111827" font-size="17" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="804" y="490">Taxonomy 保存失败类型、证据、优先级；</text><text fill="#111827" font-size="17" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="804" y="520">Router 生成路线和具体 brief；</text><text fill="#111827" font-size="17" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="804" y="550">Refiner 才拿到上下文返回完整 SVG。</text></g>

  <text x="56" y="674" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#94A3B8">Source: outputs/web/*/metrics.json, svg_icon_agent/refiner.py</text>
