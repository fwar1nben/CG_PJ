    <path d="M6.657 18c-2.572 0 -4.657 -2.007 -4.657 -4.483c0 -2.475 2.085 -4.482 4.657 -4.482c.393 -1.762 1.794 -3.2 3.675 -3.773c1.88 -.572 3.956 -.193 5.444 1c1.488 1.19 2.162 3.007 1.77 4.769h.99c1.913 0 3.464 1.56 3.464 3.486c0 1.927 -1.551 3.487 -3.465 3.487h-11.878" />
  </g>
    <text x="748" y="311" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="19" fill="#111827">依赖 LLM 服务质量和 OpenRouter 排队情况。</text>
    <path fill="#FEE2E2" d="M690,356 H1154 A10,10 0 0 1 1164,366 V410 A10,10 0 0 1 1154,420 H690 A10,10 0 0 1 680,410 V366 A10,10 0 0 1 690,356 Z" />
    
  <g transform="translate(704.0, 373.0) scale(1.25)" fill="none" stroke="#DC2626" stroke-width="2">
    <path d="M5 7l5 5l-5 5" />
    <path d="M12 19l7 0" />
  </g>
    <text x="748" y="395" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="19" fill="#111827">渲染和检查覆盖的是实用 SVG 子集，不是完整规范。</text>
    <path fill="#FEE2E2" d="M690,440 H1154 A10,10 0 0 1 1164,450 V494 A10,10 0 0 1 1154,504 H690 A10,10 0 0 1 680,494 V450 A10,10 0 0 1 690,440 Z" />
    
  <g transform="translate(704.0, 457.0) scale(1.25)" fill="none" stroke="#DC2626" stroke-width="2">
    <path d="M3 13a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v6a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -6" />
    <path d="M15 9a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -10" />
    <path d="M9 5a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v14a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -14" />
    <path d="M4 20h14" />
  </g>
    <text x="748" y="479" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="19" fill="#111827">当前实验样本规模有限，需要固定 prompt 集合批量评测。</text>
  </g>

  <g id="next">
    <path fill="#CCFBF1" d="M126,548 H1154 A10,10 0 0 1 1164,558 V594 A10,10 0 0 1 1154,604 H126 A10,10 0 0 1 116,594 V558 A10,10 0 0 1 126,548 Z" />
    
