<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#F8FAFC" />
  <path fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.4" d="M74,54 H1206 A18,18 0 0 1 1224,72 V648 A18,18 0 0 1 1206,666 H74 A18,18 0 0 1 56,648 V72 A18,18 0 0 1 74,54 Z" />
  <path fill="#0F766E" d="M63,54 H63 A7,7 0 0 1 70,61 V659 A7,7 0 0 1 63,666 H63 A7,7 0 0 1 56,659 V61 A7,7 0 0 1 63,54 Z" />
  <text x="112" y="126" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="44" font-weight="800" fill="#111827">结论：Agent 架构的价值在可控性</text>
  <text x="116" y="172" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" fill="#64748B">项目把 SVG 生成从黑箱输出变成可追踪、可验证、可修复的流程。</text>

  <g id="takeaways">
    <text x="116" y="242" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="800" fill="#1D4ED8">有效点</text>
    <path fill="#DBEAFE" d="M126,272 H606 A10,10 0 0 1 616,282 V326 A10,10 0 0 1 606,336 H126 A10,10 0 0 1 116,326 V282 A10,10 0 0 1 126,272 Z" />
    
  <g transform="translate(140.0, 289.0) scale(1.25)" fill="none" stroke="#1D4ED8" stroke-width="2">
    <path d="M4 6a8 3 0 1 0 16 0a8 3 0 1 0 -16 0" />
    <path d="M4 6v6a8 3 0 0 0 16 0v-6" />
    <path d="M4 12v6a8 3 0 0 0 16 0v-6" />
  </g>
    <text x="184" y="311" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="19" fill="#111827">RAG 记忆让历史成功和失败进入下一次目标设定。</text>
    <path fill="#DBEAFE" d="M126,356 H606 A10,10 0 0 1 616,366 V410 A10,10 0 0 1 606,420 H126 A10,10 0 0 1 116,410 V366 A10,10 0 0 1 126,356 Z" />
    
  <g transform="translate(140.0, 373.0) scale(1.25)" fill="none" stroke="#1D4ED8" stroke-width="2">
    <path d="M5 18a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
    <path d="M5 6a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
    <path d="M15 6a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
    <path d="M7 8l0 8" />
    <path d="M9 18h6a2 2 0 0 0 2 -2v-5" />
    <path d="M14 14l3 -3l3 3" />
  </g>
    <text x="184" y="395" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="19" fill="#111827">候选竞争、双 Critic 和 Selector 降低单次输出偶然性。</text>
    <path fill="#DBEAFE" d="M126,440 H606 A10,10 0 0 1 616,450 V494 A10,10 0 0 1 606,504 H126 A10,10 0 0 1 116,494 V450 A10,10 0 0 1 126,440 Z" />
    
  <g transform="translate(140.0, 457.0) scale(1.25)" fill="none" stroke="#1D4ED8" stroke-width="2">
    <path d="M3 19a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
    <path d="M19 7a2 2 0 1 0 0 -4a2 2 0 0 0 0 4" />
    <path d="M11 19h5.5a3.5 3.5 0 0 0 0 -7h-8a3.5 3.5 0 0 1 0 -7h4.5" />
  </g>
    <text x="184" y="479" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="19" fill="#111827">失败先归因再路由，Refiner 获得更具体的修复任务。</text>
  </g>

  <g id="limitations">
    <text x="680" y="242" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="800" fill="#DC2626">限制</text>
    <path fill="#FEE2E2" d="M690,272 H1154 A10,10 0 0 1 1164,282 V326 A10,10 0 0 1 1154,336 H690 A10,10 0 0 1 680,326 V282 A10,10 0 0 1 690,272 Z" />
    
