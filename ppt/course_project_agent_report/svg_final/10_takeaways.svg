    <text x="184" y="584" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">下一步：完整批量评测、人类偏好对比、扩展 SVG grammar、细化 repair route。</text>
  </g>

  <text x="116" y="628" font-family="Consolas, Courier New, monospace" font-size="15" fill="#64748B">outputs: selected SVG / refined SVG / PNG preview / metrics / traces / memory records</text>
