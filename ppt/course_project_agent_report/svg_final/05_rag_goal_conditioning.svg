    <text x="132" y="492" font-family="Consolas, Courier New, monospace" font-size="17" fill="#111827">score</text>
    <text x="254" y="492" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#64748B">验证分数，用于后续判断</text>
  </g>

