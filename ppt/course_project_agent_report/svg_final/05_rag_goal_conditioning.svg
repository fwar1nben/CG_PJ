    <line x1="132" y1="362" x2="512" y2="362" stroke="#CBD5E1" stroke-width="1" />
    <text x="132" y="392" font-family="Consolas, Courier New, monospace" font-size="17" fill="#111827">summary</text>
    <text x="254" y="392" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#64748B">本次运行经验摘要</text>
    <line x1="132" y1="412" x2="512" y2="412" stroke="#CBD5E1" stroke-width="1" />
    <text x="132" y="442" font-family="Consolas, Courier New, monospace" font-size="17" fill="#111827">patterns</text>
    <text x="254" y="442" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#64748B">成功策略和失败模式</text>
