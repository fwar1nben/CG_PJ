    <path fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" d="M690,404 H1166 A10,10 0 0 1 1176,414 V516 A10,10 0 0 1 1166,526 H690 A10,10 0 0 1 680,516 V414 A10,10 0 0 1 690,404 Z" />
    <text x="710" y="438" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="800" fill="#111827">Goal Manager 输出</text>
    <text fill="#111827" font-size="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="710" y="474">objective / visual requirements / constraints / acceptance criteria</text><text fill="#111827" font-size="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="710" y="506">后续 Rewriter、Planner、Optimizer 都能引用同一套目标口径。</text></g>

  <g id="why-it-matters">
    <path fill="#DBEAFE" d="M176,610 H1104 A8,8 0 0 1 1112,618 V640 A8,8 0 0 1 1104,648 H176 A8,8 0 0 1 168,640 V618 A8,8 0 0 1 176,610 Z" />
    <text x="640" y="635" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">RAG 的作用不是“增加材料”，而是把历史失败变成下一次生成的可用约束。</text>
  </g>

  <text x="56" y="674" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#94A3B8">Source: svg_icon_agent/memory.py, svg_icon_agent/pipeline.py</text>
