    <text x="168" y="250" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" font-weight="800" fill="#111827">图形学对象</text>
    <text fill="#111827" font-size="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="104" y="314"><tspan>输出不是位图，而是</tspan>
      <tspan fill="#1D4ED8" font-weight="700">可编辑 SVG</tspan>
      </text><text fill="#111827" font-size="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="104" y="348">需要满足 viewBox、路径、颜色、</text><text fill="#111827" font-size="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="104" y="382">可解析性和渲染安全。</text><path fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" d="M112,434 H388 A8,8 0 0 1 396,442 V502 A8,8 0 0 1 388,510 H112 A8,8 0 0 1 104,502 V442 A8,8 0 0 1 112,434 Z" />
    <text x="124" y="466" font-family="Consolas, Courier New, monospace" font-size="16" fill="#64748B">baseline/*.svg</text>
    <text x="124" y="494" font-family="Consolas, Courier New, monospace" font-size="16" fill="#64748B">refined/*.svg</text>
  </g>

