<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#F8FAFC" />
  <text x="56" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="800" fill="#111827">对齐 Project 3：Agent 不只是一次模型调用</text>
  <path fill="#DBEAFE" d="M64,96 H1216 A8,8 0 0 1 1224,104 V140 A8,8 0 0 1 1216,148 H64 A8,8 0 0 1 56,140 V104 A8,8 0 0 1 64,96 Z" />
  <text x="78" y="129" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#111827">项目对应课程说明里的 2D 生成与多 Agent 协作方向：把“图标生成”做成有状态、有工具、有反馈的系统。</text>

  <g id="card-graphics">
    <path fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2" d="M86,188 H414 A10,10 0 0 1 424,198 V538 A10,10 0 0 1 414,548 H86 A10,10 0 0 1 76,538 V198 A10,10 0 0 1 86,188 Z" />
