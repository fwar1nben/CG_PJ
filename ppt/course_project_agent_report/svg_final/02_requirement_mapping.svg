    <text x="558" y="250" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" font-weight="800" fill="#111827">Agent 设计</text>
    <text fill="#111827" font-size="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="494" y="314">Goal Manager、Rewriter、Planner、</text><text fill="#111827" font-size="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="494" y="348">Generator、Critic、Selector、</text><text fill="#111827" font-size="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="494" y="382">Validator、Router、Refiner 分工明确。</text><path fill="#CCFBF1" stroke="#CBD5E1" stroke-width="1" d="M502,434 H778 A8,8 0 0 1 786,442 V502 A8,8 0 0 1 778,510 H502 A8,8 0 0 1 494,502 V442 A8,8 0 0 1 502,434 Z" />
    <text x="514" y="466" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#111827">每个 LLM Agent 只处理一个窄任务，</text>
    <text x="514" y="494" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#111827">工具负责可验证检查。</text>
  </g>

