    <text x="948" y="250" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" font-weight="800" fill="#111827">交付证据</text>
    <text fill="#111827" font-size="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="884" y="314">输出可复查：SVG、PNG、gallery、</text><text fill="#111827" font-size="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="884" y="348">metrics、trace、raw responses、</text><text fill="#111827" font-size="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="884" y="382">failure taxonomy 和 repair routes。</text><path fill="#FEF3C7" stroke="#CBD5E1" stroke-width="1" d="M892,434 H1168 A8,8 0 0 1 1176,442 V502 A8,8 0 0 1 1168,510 H892 A8,8 0 0 1 884,502 V442 A8,8 0 0 1 892,434 Z" />
