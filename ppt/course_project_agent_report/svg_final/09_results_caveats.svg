    <text fill="#111827" font-size="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="826" y="500">这些结果来自 outputs/web 下的 15 次样本运行。</text><text fill="#111827" font-size="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="826" y="532">它们证明修复链路可用，但不能替代完整、</text><text fill="#111827" font-size="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" x="826" y="564">固定 prompt 集合上的批量对比实验。</text></g>

