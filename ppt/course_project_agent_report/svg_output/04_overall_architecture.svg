    <text x="1126" y="569" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">修复路线</text>
    <line x1="1022" y1="553" x2="1066" y2="553" stroke="#DC2626" stroke-width="2"/>
    <polygon points="1066,553 1054,546 1054,560" fill="#DC2626"/>
    <path d="M1141 520 L1141 610 L751 610 L751 586" fill="none" stroke="#DC2626" stroke-width="2"/>
    <polygon points="751,586 744,598 758,598" fill="#DC2626"/>
