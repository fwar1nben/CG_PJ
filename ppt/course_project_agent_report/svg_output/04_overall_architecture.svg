    <rect x="948" y="178" width="18" height="14" rx="3" fill="#DBEAFE"/><text x="974" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">LLM Agent</text>
    <rect x="1048" y="178" width="18" height="14" rx="3" fill="#CCFBF1"/><text x="1074" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">Tool</text>
  </g>

  <g id="rag-column">
