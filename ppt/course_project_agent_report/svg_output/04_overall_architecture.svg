<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#F8FAFC"/>
  <text x="56" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="800" fill="#111827">总体架构：RAG 记忆 + 多 Agent 生成/验证/修复</text>
  <rect x="56" y="96" width="1168" height="52" rx="8" fill="#DBEAFE"/>
  <text x="78" y="129" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#111827">本地历史运行先作为 RAG 上下文进入 Goal Manager，随后 Agent 链路逐步收窄目标、生成候选、验证并修复 SVG。</text>

  <g id="legend">
