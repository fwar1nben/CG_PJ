    <text x="978" y="459" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="800" fill="#111827">Selector</text>
    <text x="978" y="481" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">可解释选择</text>
