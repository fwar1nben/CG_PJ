    <rect x="894" y="186" width="134" height="70" rx="10" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.3"/>
    <use data-icon="tabler-outline/layout" x="914" y="204" width="28" height="28" fill="#1D4ED8" stroke-width="2"/>
    <text x="954" y="214" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="800" fill="#111827">Generator</text>
    <text x="954" y="238" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">3 个候选</text>
