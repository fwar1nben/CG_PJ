    <text x="96" y="226" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F766E">RAG 输入</text>
    <rect x="96" y="258" width="166" height="78" rx="10" fill="#CCFBF1"/>
