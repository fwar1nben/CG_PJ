    <text x="156" y="288" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Memory</text>
    <text x="156" y="314" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#64748B">历史运行记录</text>
    <rect x="96" y="370" width="166" height="78" rx="10" fill="#CCFBF1"/>
    <use data-icon="tabler-outline/search" x="112" y="390" width="34" height="34" fill="#0F766E" stroke-width="2"/>
    <text x="156" y="400" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Top-k Retrieve</text>
    <text x="156" y="426" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#64748B">BM25 相似经验</text>
