<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#F8FAFC"/>
  <rect x="56" y="54" width="1168" height="612" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.4"/>
  <rect x="56" y="54" width="14" height="612" rx="7" fill="#1D4ED8"/>
  <g id="title-block">
    <text x="112" y="160" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="68" font-weight="800" fill="#111827">SVG Icon Agent</text>
    <text x="116" y="212" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="26" font-weight="600" fill="#1D4ED8">可编辑 SVG 图标生成的多 Agent 流水线</text>
    <text x="116" y="278" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" fill="#64748B">
      <tspan x="116" dy="0">计算机图形学 Project 3 汇报</tspan>
      <tspan x="116" dy="34">目标：把短提示词变成可检查、可修复、可追踪的 SVG 图标生成过程</tspan>
    </text>
  </g>
  <g id="cover-thesis">
    <rect x="116" y="386" width="512" height="118" rx="12" fill="#DBEAFE"/>
    <use data-icon="tabler-outline/git-branch" x="144" y="422" width="46" height="46" fill="#1D4ED8" stroke-width="2"/>
    <text x="212" y="430" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">核心主张</text>
    <text x="212" y="464" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#111827">不是一次模型调用，而是“记忆检索 + 多 Agent 协作 + 验证修复”的工程化生成。</text>
  </g>
  <g id="example-strip">
    <rect x="724" y="116" width="420" height="420" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.2"/>
    <image href="../images/gen_rocket.png" x="756" y="142" width="88" height="88" preserveAspectRatio="xMidYMid meet"/>
    <image href="../images/gen_coffee.png" x="868" y="142" width="88" height="88" preserveAspectRatio="xMidYMid meet"/>
    <image href="../images/gen_dog.png" x="980" y="142" width="88" height="88" preserveAspectRatio="xMidYMid meet"/>
    <image href="../images/gen_book.png" x="756" y="262" width="88" height="88" preserveAspectRatio="xMidYMid meet"/>
    <image href="../images/gen_landscape.png" x="868" y="262" width="88" height="88" preserveAspectRatio="xMidYMid meet"/>
    <image href="../images/gen_cloud.png" x="980" y="262" width="88" height="88" preserveAspectRatio="xMidYMid meet"/>
    <image href="../images/gen_shield.png" x="812" y="382" width="88" height="88" preserveAspectRatio="xMidYMid meet"/>
    <image href="../images/gen_calendar.png" x="924" y="382" width="88" height="88" preserveAspectRatio="xMidYMid meet"/>
    <text x="934" y="566" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#64748B">精选 refined 输出样例</text>
  </g>
  <g id="footer">
    <text x="116" y="620" font-family="Consolas, Courier New, monospace" font-size="15" fill="#64748B">svg_icon_agent/ pipeline.py / llm_agents.py / web_app.py</text>
    <text x="1188" y="626" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#94A3B8">01</text>
  </g>
