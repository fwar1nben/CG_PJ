<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#F8FAFC"/>
  <text x="56" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="800" fill="#111827">Web UI：让每个 Agent 节点可见</text>
  <rect x="56" y="96" width="1168" height="52" rx="8" fill="#DBEAFE"/>
  <text x="78" y="129" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#111827">前端不是装饰：它把 prompt rewrite、memory context、候选、验证和 post-run 优化都变成可检查对象。</text>

  <g id="web-panel">
    <rect x="76" y="182" width="510" height="430" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <rect x="76" y="182" width="510" height="42" rx="12" fill="#111827"/>
    <circle cx="106" cy="203" r="6" fill="#DC2626"/>
    <circle cx="126" cy="203" r="6" fill="#F59E0B"/>
    <circle cx="146" cy="203" r="6" fill="#16A34A"/>
    <text x="176" y="209" font-family="Consolas, Courier New, monospace" font-size="14" fill="#FFFFFF">SVG Icon Agent Web UI</text>

    <g id="workflow-states">
      <text x="108" y="260" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="21" font-weight="800" fill="#111827">运行状态图</text>
      <rect x="108" y="292" width="92" height="42" rx="8" fill="#CCFBF1" stroke="#0F766E" stroke-width="1"/>
      <text x="154" y="319" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Memory</text>
      <rect x="226" y="292" width="92" height="42" rx="8" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1"/>
      <text x="272" y="319" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Goal</text>
      <rect x="344" y="292" width="92" height="42" rx="8" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1"/>
      <text x="390" y="319" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Planner</text>
      <rect x="462" y="292" width="92" height="42" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
      <text x="508" y="319" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Selector</text>
      <line x1="200" y1="313" x2="226" y2="313" stroke="#CBD5E1" stroke-width="2"/>
      <line x1="318" y1="313" x2="344" y2="313" stroke="#CBD5E1" stroke-width="2"/>
      <line x1="436" y1="313" x2="462" y2="313" stroke="#CBD5E1" stroke-width="2"/>
    </g>

    <g id="ui-features">
      <rect x="108" y="374" width="196" height="72" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <use data-icon="tabler-outline/wand" x="128" y="395" width="28" height="28" fill="#1D4ED8" stroke-width="2"/>
      <text x="168" y="404" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="800" fill="#111827">Prompt Rewrite</text>
      <text x="168" y="428" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">原始输入和改写结果可见</text>
      <rect x="330" y="374" width="196" height="72" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <use data-icon="tabler-outline/database" x="350" y="395" width="28" height="28" fill="#0F766E" stroke-width="2"/>
      <text x="390" y="404" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="800" fill="#111827">Memory Context</text>
      <text x="390" y="428" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">检索到的经验可复查</text>
      <rect x="108" y="470" width="196" height="72" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <use data-icon="tabler-outline/layout" x="128" y="491" width="28" height="28" fill="#F59E0B" stroke-width="2"/>
      <text x="168" y="500" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="800" fill="#111827">Candidates</text>
      <text x="168" y="524" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">候选、选中、baseline 对比</text>
      <rect x="330" y="470" width="196" height="72" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <use data-icon="tabler-outline/tools" x="350" y="491" width="28" height="28" fill="#DC2626" stroke-width="2"/>
      <text x="390" y="500" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="800" fill="#111827">Post-run feedback</text>
      <text x="390" y="524" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">人工建议触发二次优化</text>
    </g>
  </g>

  <g id="gallery">
    <rect x="636" y="182" width="568" height="430" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <text x="668" y="224" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" font-weight="800" fill="#111827">精选生成结果</text>
    <text x="668" y="252" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#64748B">选择标准：轮廓清楚、放大不乱、覆盖不同 prompt 类型。</text>
    <g id="icons-row-1">
      <rect x="668" y="282" width="112" height="126" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <image href="../images/gen_rocket.png" x="686" y="292" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
      <text x="724" y="392" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">rocket</text>
      <rect x="800" y="282" width="112" height="126" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <image href="../images/gen_coffee.png" x="818" y="292" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
      <text x="856" y="392" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">coffee</text>
      <rect x="932" y="282" width="112" height="126" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <image href="../images/gen_dog.png" x="950" y="292" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
      <text x="988" y="392" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">dog</text>
      <rect x="1064" y="282" width="112" height="126" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <image href="../images/gen_book.png" x="1082" y="292" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
      <text x="1120" y="392" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">book</text>
    </g>
    <g id="icons-row-2">
      <rect x="668" y="432" width="112" height="126" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <image href="../images/gen_landscape.png" x="686" y="442" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
      <text x="724" y="542" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">landscape</text>
      <rect x="800" y="432" width="112" height="126" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <image href="../images/gen_cloud.png" x="818" y="442" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
      <text x="856" y="542" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">cloud</text>
      <rect x="932" y="432" width="112" height="126" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <image href="../images/gen_shield.png" x="950" y="442" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
      <text x="988" y="542" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">shield</text>
      <rect x="1064" y="432" width="112" height="126" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
      <image href="../images/gen_calendar.png" x="1082" y="442" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
      <text x="1120" y="542" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">calendar</text>
    </g>
  </g>

  <text x="56" y="674" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#94A3B8">Source: svg_icon_agent/web_app.py, outputs/web/*/refined/*.svg</text>
  <text x="1224" y="674" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#94A3B8">08</text>
</svg>
